              schema:
                type: object
                properties:
                  companyName: { type: string }
                  logoUrl: { type: string }
                  primaryColor: { type: string }
    put:
      tags: [System]
      summary: Update tenant branding (super_admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyName, primaryColor]
              properties:
                companyName: { type: string, maxLength: 100 }
                logoUrl: { type: string, maxLength: 2048 }
                primaryColor: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyName: { type: string }
                  logoUrl: { type: string }
                  primaryColor: { type: string }

  /api/v1/system/custom-roles:
    get:
      tags: [System]
      summary: List custom roles (super_admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        permissions: { type: array, items: { type: string } }
    post:
      tags: [System]
      summary: Create a custom role (super_admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name: { type: string, maxLength: 60 }
                permissions: { type: array, items: { type: string } }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  permissions: { type: array, items: { type: string } }

  /api/v1/system/custom-roles/{id}:
    put:
      tags: [System]
      summary: Update a custom role (super_admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name: { type: string }
                permissions: { type: array, items: { type: string } }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  permissions: { type: array, items: { type: string } }
    delete:
      tags: [System]
      summary: Delete a custom role (super_admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object

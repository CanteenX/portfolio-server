    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get:
      tags: [Chat]
      summary: SSE stream for real-time messages (participant-scoped)
      description: |
        Server-Sent Events endpoint. Events: `message`, `message_edited`, `message_deleted`.
        30s heartbeat. Native EventSource cannot set headers, so pass JWT via `?token=`.
        Requires participant access or super_admin.
      parameters:
        - name: token
          in: query
          schema: { type: string }
          description: JWT token (alternative to Authorization header for SSE clients)
      responses:
        "200":
          description: SSE stream established
          content:
            text/event-stream:
              schema: { type: string }
        "403": { $ref: "#/components/responses/403" }


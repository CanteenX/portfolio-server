openapi: "3.0.3"
info:
  title: Admin Platform API
  version: "1.0.0"
  description: |
    Backend API for the Admin Platform.
    All module endpoints require **Bearer JWT** authentication and pass through a
    four-layer guard chain: `authenticateJwt -> requireRole -> requireFeatureEnabled -> requirePermission`.

    **Error envelope** (all non-2xx responses):
    ```json
    { "code": "<ErrorCode>", "message": "<human string>" }
    ```

    **Pagination envelope** (list endpoints):
    ```json
    { "items": [...], "page": 1, "limit": 50, "total": 123 }
    ```
  contact:
    name: Admin Platform
servers:
  - url: http://localhost:7002
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: System
  - name: eCommerce
  - name: Payments
  - name: CRM
  - name: Invoices
  - name: API Management
  - name: Support Tickets
  - name: File Manager
  - name: Chat
  - name: Mailbox
  - name: Projects
  - name: Tasks
  - name: Calendar
  - name: ToDo
  - name: Job

# ─── Security ────────────────────────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Two-tier JWT.  Tokens are signed with role-specific secrets
        (`JWT_SECRET_SUPER_ADMIN` / `JWT_SECRET_ADMIN`).
        Payload: `{ sub, email, role }`.

  # ─── Reusable schemas ───────────────────────────────────────────────
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [UNAUTHORIZED, FORBIDDEN, BAD_REQUEST, NOT_FOUND, FEATURE_DISABLED, INTERNAL_ERROR]
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ── Auth ──
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            role: { type: string, enum: [super_admin, admin] }

    SessionBootstrap:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            role: { type: string, enum: [super_admin, admin] }
        permissions: { type: array, items: { type: string } }
        features: { type: object, additionalProperties: { type: boolean } }
        moduleCatalog:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }

    FeatureConfig:
      type: object
      additionalProperties: { type: boolean }

    # ── eCommerce ──
    Product:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        sku: { type: string }
        description: { type: string }
        priceMinor: { type: integer }
        currency: { type: string }
        stock: { type: integer }
        status: { type: string, enum: [draft, active, archived] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProductPayload:
      type: object
      required: [title, sku, priceMinor]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        sku: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 4000 }
        priceMinor: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3, default: USD }
        stock: { type: integer, minimum: 0, default: 0 }
        status: { type: string, enum: [draft, active, archived], default: draft }

    Order:
      type: object
      properties:
        _id: { type: string }
        orderNumber: { type: string }
        customerName: { type: string }
        customerEmail: { type: string }
        currency: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              productId: { type: string }
              qty: { type: integer }
              unitPriceMinor: { type: integer }
              lineTotalMinor: { type: integer }
        subtotalMinor: { type: integer }
        taxMinor: { type: integer }
        shippingMinor: { type: integer }
        grandTotalMinor: { type: integer }
        status: { type: string, enum: [open, paid, shipped, completed, cancelled, refunded] }
        paymentStatus: { type: string }
        stockReverted: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrderPayload:
      type: object
      required: [customerName, customerEmail, items]
      properties:
        customerName: { type: string, minLength: 1 }
        customerEmail: { type: string, format: email }
        currency: { type: string, default: USD }
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [productId, qty]
            properties:
              productId: { type: string }
              qty: { type: integer, minimum: 1 }
        taxMinor: { type: integer, minimum: 0, default: 0 }
        shippingMinor: { type: integer, minimum: 0, default: 0 }

    # ── CRM ──
    Contact:
      type: object
      properties:
        _id: { type: string }
        displayName: { type: string }
        primaryEmail: { type: string }
        primaryPhone: { type: string }
        companyName: { type: string }
        ownerUserId: { type: string }
        tags: { type: array, items: { type: string } }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ContactPayload:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 200 }
        primaryEmail: { type: string, format: email }
        primaryPhone: { type: string, maxLength: 40 }
        companyName: { type: string, maxLength: 200 }
        ownerUserId: { type: string }
        tags: { type: array, items: { type: string, maxLength: 40 }, maxItems: 20 }
        notes: { type: string, maxLength: 2000 }

    Pipeline:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        isDefault: { type: boolean }
        stages:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              order: { type: integer }
              isTerminalWon: { type: boolean }
              isTerminalLost: { type: boolean }
        createdAt: { type: string, format: date-time }

    Deal:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        contactId: { type: string }
        pipelineId: { type: string }
        stageKey: { type: string }
        status: { type: string, enum: [open, won, lost] }
        amountValue: { type: number }
        currency: { type: string }
        lostReason: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Invoices ──
    Invoice:
      type: object
      properties:
        _id: { type: string }
        invoiceNumber: { type: string }
        contactId: { type: string }
        dealId: { type: string }
        orderId: { type: string }
        currency: { type: string }
        lineItems:
          type: array
          items:
            type: object
            properties:
              description: { type: string }
              quantity: { type: integer }
              unitPriceMinor: { type: integer }
              lineTotalMinor: { type: integer }
        subtotalMinor: { type: integer }
        taxMinor: { type: integer }
        discountMinor: { type: integer }
        grandTotalMinor: { type: integer }
        amountPaidMinor: { type: integer }
        status: { type: string, enum: [draft, issued, sent, partially_paid, overdue, paid, void, uncollectible] }
        dueAt: { type: string, format: date-time }
        issuedAt: { type: string, format: date-time }
        sentAt: { type: string, format: date-time }
        paidAt: { type: string, format: date-time }
        voidedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    # ── API Management ──
    ApiKey:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        description: { type: string }
        keyPrefix: { type: string }
        keyLast4: { type: string }
        status: { type: string, enum: [active, revoked] }
        scopes: { type: array, items: { type: string } }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time }
        createdByUserId: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Support Tickets ──
    Ticket:
      type: object
      properties:
        _id: { type: string }
        ticketNumber: { type: string }
        subject: { type: string }
        description: { type: string }
        requesterName: { type: string }
        requesterEmail: { type: string }
        channel: { type: string, enum: [email, chat, phone, web] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        status: { type: string, enum: [open, in_progress, pending_customer, resolved, closed] }
        tags: { type: array, items: { type: string } }
        assignedToUserId: { type: string }
        firstResponseAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time }
        comments:
          type: array
          items:
            type: object
            properties:
              message: { type: string }
              authorUserId: { type: string }
              isInternal: { type: boolean }
              createdAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    # ── File Manager ──
    FileEntry:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [file, folder] }
        parentId: { type: string, nullable: true }
        status: { type: string, enum: [active, trashed] }
        sizeBytes: { type: integer }
        mimeType: { type: string }
        extension: { type: string }
        tags: { type: array, items: { type: string } }
        isStarred: { type: boolean }
        trashedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    # ── Chat ──
    Conversation:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        participantUserIds: { type: array, items: { type: string } }
        status: { type: string, enum: [active, archived] }
        messageCount: { type: integer }
        lastMessageAt: { type: string, format: date-time }
        createdByUserId: { type: string }
        createdAt: { type: string, format: date-time }

    ChatMessage:
      type: object
      properties:
        _id: { type: string }
        conversationId: { type: string }
        senderUserId: { type: string }
        senderEmail: { type: string }
        content: { type: string }
        editedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    # ── Mailbox ──
    MailboxMessage:
      type: object
      properties:
        _id: { type: string }
        subject: { type: string }
        body: { type: string }
        fromAddress: { type: string }
        fromName: { type: string }
        toAddresses: { type: array, items: { type: string } }
        ccAddresses: { type: array, items: { type: string } }
        bccAddresses: { type: array, items: { type: string } }
        folder: { type: string, enum: [inbox, sent, drafts, trash, archive] }
        status: { type: string, enum: [unread, read, flagged] }
        isStarred: { type: boolean }
        sentAt: { type: string, format: date-time }
        ownerUserId: { type: string }
        inReplyToId: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Projects ──
    Project:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [planning, active, on_hold, completed, archived] }
        ownerUserId: { type: string }
        memberUserIds: { type: array, items: { type: string } }
        startDate: { type: string, format: date-time }
        targetEndDate: { type: string, format: date-time }
        actualEndDate: { type: string, format: date-time }
        tags: { type: array, items: { type: string } }
        priority: { type: string, enum: [low, medium, high, critical] }
        createdAt: { type: string, format: date-time }

    # ── Tasks ──
    Task:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        projectId: { type: string }
        status: { type: string, enum: [todo, in_progress, review, done, cancelled] }
        priority: { type: string, enum: [low, medium, high, critical] }
        assigneeUserId: { type: string }
        reporterUserId: { type: string }
        dueDate: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        tags: { type: array, items: { type: string } }
        estimatedHours: { type: number }
        createdAt: { type: string, format: date-time }

    # ── Calendar ──
    CalendarEvent:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        allDay: { type: boolean }
        location: { type: string }
        recurrence: { type: string, enum: [none, daily, weekly, monthly] }
        color: { type: string }
        attendeeUserIds: { type: array, items: { type: string } }
        status: { type: string, enum: [scheduled, cancelled] }
        tags: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }

    # ── ToDo ──
    TodoItem:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [pending, completed] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        ownerUserId: { type: string }
        tags: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }

    # ── Job ──
    JobPosting:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        department: { type: string }
        location: { type: string }
        employmentType: { type: string, enum: [full_time, part_time, contract, internship] }
        experienceLevel: { type: string, enum: [entry, mid, senior, lead] }
        salaryMinMinor: { type: integer }
        salaryMaxMinor: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [draft, open, closed, filled] }
        tags: { type: array, items: { type: string } }
        postedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    JobApplication:
      type: object
      properties:
        _id: { type: string }
        jobId: { type: string }
        applicantName: { type: string }
        applicantEmail: { type: string }
        resumeUrl: { type: string }
        coverLetter: { type: string }
        status: { type: string, enum: [submitted, screening, interview, offered, hired, rejected, withdrawn] }
        notes: { type: string }
        appliedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

  # ─── Reusable parameters ──────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: MongoDB ObjectId

  # ─── Reusable responses ───────────────────────────────────────────
  responses:
    "400":
      description: Bad request (validation error)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    "401":
      description: Unauthorized (missing / invalid JWT)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    "403":
      description: Forbidden (role / permission / feature disabled)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    "404":
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# ═══════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════
paths:
  # ── Health ─────────────────────────────────────────────────────────
  /api/v1/system/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # ── Auth ───────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain JWT
      description: "Rate-limited: 30 req / 15 min"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: JWT and user info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          $ref: "#/components/responses/401"

  # ── System ─────────────────────────────────────────────────────────
  /api/v1/system/session-bootstrap:
    get:
      tags: [System]
      summary: Session bootstrap (user, permissions, features, catalog)
      responses:
        "200":
          description: Bootstrap payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionBootstrap" }
        "401": { $ref: "#/components/responses/401" }

  /api/v1/system/module-catalog:
    get:
      tags: [System]
      summary: List module catalog
      responses:
        "200":
          description: Module list
          content:
            application/json:
              schema:
                type: object
                properties:
                  modules:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }

  /api/v1/system/feature-config:
    get:
      tags: [System]
      summary: Get feature config
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  features: { $ref: "#/components/schemas/FeatureConfig" }
    put:
      tags: [System]
      summary: Update feature config (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabledModules]
              properties:
                enabledModules:
                  type: array
                  items:
                    type: string
                    enum: [calendar, chat, mailbox, ecommerce, projects, tasks, crm, invoices, support-tickets, file-manager, todo, job, api-management]
      responses:
        "200":
          description: Updated feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  features: { $ref: "#/components/schemas/FeatureConfig" }
        "403": { $ref: "#/components/responses/403" }

  # ── Payment Settings ────────────────────────────────────────────────
  /api/v1/system/payment-settings:
    get:
      tags: [System]
      summary: Get payment provider settings (super_admin only)
      responses:
        "200":
          description: Payment provider status and redirect config
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        displayName: { type: string }
                        configured: { type: boolean }
                        webhookPath: { type: string }
                  defaultSuccessUrl: { type: string }
                  defaultCancelUrl: { type: string }
                  allowedRedirectOrigins:
                    type: array
                    items: { type: string }
                  paypalMode: { type: string }
        "403": { $ref: "#/components/responses/403" }

  # ── Dashboard KPIs ─────────────────────────────────────────────────
  /api/v1/system/dashboard-kpis:
    get:
      tags: [System]
      summary: Cross-module dashboard KPIs (admin+)
      responses:
        "200":
          description: Aggregated KPI counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  openTickets: { type: integer }
                  activeTasks: { type: integer }
                  todayEvents: { type: integer }
                  openDeals: { type: integer }
                  pipelineValue: { type: number }
                  openJobs: { type: integer }
                  pendingApplications: { type: integer }

  # ── Audit Log ──────────────────────────────────────────────────────
  /api/v1/system/audit-log:
    get:
      tags: [System]
      summary: Get audit log entries (super_admin only)
      parameters:
        - name: entity
          in: query
          schema: { type: string }
          description: Filter by entity type
        - $ref: "#/components/parameters/LimitParam"
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        _id: { type: string }
                        action: { type: string }
                        entity: { type: string }
                        entityId: { type: string }
                        userId: { type: string }
                        userEmail: { type: string }
                        before: { type: object }
                        after: { type: object }
                        createdAt: { type: string, format: date-time }
                  total: { type: integer }
        "403": { $ref: "#/components/responses/403" }

  # ── System Settings ─────────────────────────────────────────────────
  /api/v1/system/settings:
    get:
      tags: [System]
      summary: Get system settings (admin+)
      responses:
        "200":
          description: Current system settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  timezone: { type: string, example: "UTC" }
                  defaultCurrency: { type: string, example: "USD" }
                  locale: { type: string, example: "en-US" }
    put:
      tags: [System]
      summary: Update system settings (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timezone, defaultCurrency, locale]
              properties:
                timezone: { type: string }
                defaultCurrency: { type: string, maxLength: 3 }
                locale: { type: string }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  timezone: { type: string }
                  defaultCurrency: { type: string }
                  locale: { type: string }
        "403": { $ref: "#/components/responses/403" }

  # ── Global Search ──────────────────────────────────────────────────
  /api/v1/system/search:
    get:
      tags: [System]
      summary: Global cross-module search (admin+)
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
          description: Search query (min 2 chars)
      responses:
        "200":
          description: Search results grouped by module
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        module: { type: string }
                        id: { type: string }
                        label: { type: string }

  # ── CSV Export ─────────────────────────────────────────────────────
  /api/v1/system/export/{module}:
    parameters:
      - name: module
        in: path
        required: true
        schema: { type: string, enum: [support-tickets, tasks, projects, crm, job] }
    get:
      tags: [System]
      summary: Export module data as CSV (admin+)
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema: { type: string }
